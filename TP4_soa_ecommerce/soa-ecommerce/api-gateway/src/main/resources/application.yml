server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Exercice 2 : Routes vers Product Service et Order Service
      routes:
        # Route pour Product Service
        - id: product-service
          uri: lb://product-service          # lb:// = load balancer via Eureka
          predicates:
            - Path=/products/**              # http://localhost:8080/products/**
          filters:
            - RewritePath=/products/(?<segment>.*), /api/products/${segment}

        # Route alternative avec prefixe /api/products
        - id: product-service-api
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - RewritePath=/api/products/(?<segment>.*), /api/products/${segment}

        # Route pour Order Service
        - id: order-service
          uri: lb://order-service            # lb:// = load balancer via Eureka
          predicates:
            - Path=/orders/**                # http://localhost:8080/orders/**
          filters:
            - RewritePath=/orders/(?<segment>.*), /api/orders/${segment}

        # Route alternative avec prefixe /api/orders
        - id: order-service-api
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /api/orders/${segment}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
